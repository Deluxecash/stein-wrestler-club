<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stein-Wrestling | Championship Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #060608; --bg-panel: rgba(20, 20, 25, 0.75); --bg-input: #121216; --text-main: #ffffff; --text-muted: #8e8e9f; --accent-orange: #ff5500; --glow-strength: 20px; --border-radius: 12px; --border-color: rgba(255, 255, 255, 0.06); --font-gaming: 'Orbitron', sans-serif; --font-clean: 'Inter', sans-serif; }
        body.light-theme { --bg-dark: #f0f2f5; --bg-panel: rgba(255, 255, 255, 0.85); --bg-input: #ffffff; --text-main: #121216; --text-muted: #65676b; --border-color: rgba(0, 0, 0, 0.08); }
        * { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease, color 0.25s ease; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: var(--font-clean); display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; background-image: radial-gradient(circle at 50% -20%, rgba(255, 85, 0, 0.15) 0%, var(--bg-dark) 70%); }
        h1, h2, h3, th, .role-title, .nav-left h2, .start-title, .locked-title, .nav-link, #nav-username, .rank-badge { font-family: var(--font-gaming); letter-spacing: 1px; }
        .hidden { display: none !important; }
        #view-startscreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #040406; background-image: radial-gradient(circle at 50% 50%, rgba(255, 85, 0, 0.25) 0%, #050507 80%); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; cursor: pointer; }
        .start-title { font-size: 4.5rem; font-weight: 900; background: linear-gradient(45deg, #ff5500, #ff0055); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 40px rgba(255, 85, 0, 0.5); margin-bottom: 1rem; text-align: center; text-transform: uppercase; }
        .start-subtitle { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 4rem; letter-spacing: 4px; font-weight: 600; }
        .start-prompt { font-family: var(--font-gaming); font-size: 1.3rem; font-weight: 700; color: #ffffff; letter-spacing: 2px; animation: pulseGlow 1.5s infinite alternate ease-in-out; }
        @keyframes pulseGlow { from { text-shadow: 0 0 5px rgba(255,255,255,0.2); opacity: 0.3; transform: scale(0.98); } to { text-shadow: 0 0 25px var(--accent-orange), 0 0 10px var(--accent-orange); opacity: 1; transform: scale(1.02); } }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 2rem; background: rgba(10, 10, 12, 0.4); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; }
        .nav-left { display: flex; align-items: center; gap: 2rem; }
        .nav-left h2 { font-weight: 900; background: linear-gradient(45deg, #ff5500, #ff0055); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 30px rgba(255, 85, 0, 0.4); margin-right: 1rem; }
        .nav-link { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.95rem; font-weight: 700; padding: 5px 0; text-transform: uppercase; }
        .nav-link.active { color: var(--text-main); border-bottom: 2px solid var(--accent-orange); text-shadow: 0 0 var(--glow-strength) rgba(255, 85, 0, 0.5); }
        .nav-right { display: flex; align-items: center; gap: 1.5rem; }
        #nav-username { font-weight: 700; border-right: 1px solid var(--border-color); padding-right: 1.5rem; color: var(--text-main); font-size: 0.95rem; text-transform: uppercase; }
        .icon-btn { background: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-muted); padding: 4px; }
        .icon-btn:hover { transform: scale(1.1); color: var(--text-main); }
        .panel { background: var(--bg-panel); backdrop-filter: blur(12px); border: 1px solid var(--border-color); border-radius: var(--border-radius); }
        .auth-container { max-width: 420px; margin: 12vh auto; text-align: center; padding: 2.5rem; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .input-group { text-align: left; margin-bottom: 1.5rem; }
        .input-group label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); margin-bottom: 0.6rem; letter-spacing: 1px; }
        .input-group input { width: 100%; padding: 14px; background-color: var(--bg-input); border: 1px solid var(--border-color); border-radius: var(--border-radius); color: var(--text-main); outline: none; font-size: 1rem; }
        .btn-primary { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent-orange), #ff2200); color: white; border: none; border-radius: var(--border-radius); font-weight: 700; cursor: pointer; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(255, 85, 0, 0.4); font-family: var(--font-gaming); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 var(--glow-strength) var(--accent-orange); }
        .btn-danger { background: linear-gradient(135deg, #ff3333, #bb0000); }
        .switch-auth { margin-top: 1.5rem; font-size: 0.9rem; }
        .switch-auth a { color: var(--accent-orange); text-decoration: none; font-weight: 600; }
        .dashboard-header { text-align: center; padding: 4rem 1rem 2rem 1rem; }
        .dashboard-header h1 { font-size: 2.8rem; font-weight: 900; }
        .dashboard-header p { color: var(--text-muted); margin: 0.8rem 0 2.5rem 0; font-size: 1.1rem; }
        .search-wrapper { position: relative; width: 350px; margin: 0 auto; }
        .search-icon { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
        #search-roles { padding: 14px 25px 14px 50px; width: 100%; border-radius: 30px; border: 1px solid var(--border-color); background-color: var(--bg-input); color: var(--text-main); outline: none; font-size: 1rem; }
        .roles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; padding: 2rem; max-width: 1200px; margin: 0 auto; }
        .role-card { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: var(--border-radius); padding: 1.5rem; cursor: pointer; position: relative; overflow: hidden; }
        .role-card::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--card-color, #fff); }
        .role-card-header { display: flex; align-items: center; gap: 15px; margin-bottom: 1.2rem; }
        .role-card-icon { width: 46px; height: 46px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.04); border-radius: 50%; border: 1px solid rgba(255,255,255,0.1); color: var(--card-color); }
        .leaderboard-container { max-width: 850px; margin: 0 auto 4rem auto; padding: 2rem; box-shadow: 0 15px 40px rgba(0,0,0,0.2); }
        .leaderboard-table { width: 100%; border-collapse: collapse; text-align: left; }
        .leaderboard-table th { padding: 15px; border-bottom: 2px solid var(--accent-orange); color: var(--text-muted); font-size: 0.85rem; font-weight: 700; text-transform: uppercase; }
        .leaderboard-table td { padding: 18px 15px; border-bottom: 1px solid var(--border-color); font-size: 1.05rem; font-weight: 600; }
        .rank-badge { display: inline-block; width: 32px; height: 32px; line-height: 32px; text-align: center; border-radius: 50%; font-weight: 900; font-size: 0.9rem; }
        .rank-1 { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #060608; }
        .btn-secondary { background: none; border: 1px solid var(--border-color); padding: 10px 20px; border-radius: 20px; color: var(--text-muted); cursor: pointer; margin: 2rem; font-weight: 600; font-family: var(--font-gaming); font-size: 0.8rem; }
        .mastery-container { max-width: 750px; margin: 0 auto; padding: 0 2rem 4rem 2rem; }
        .progress-bar-container { width: 100%; height: 12px; background-color: rgba(0,0,0,0.2); border-radius: 6px; overflow: hidden; border: 1px solid var(--border-color); }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--mastery-color), #ffffff); width: 0%; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(4, 4, 6, 0.85); backdrop-filter: blur(8px); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-box { width: 90%; max-width: 450px; padding: 2.5rem; text-align: center; }
    </style>
</head>
<body>
    <div id="view-startscreen">
        <h1 class="start-title">Stein-Wrestling</h1>
        <p class="start-subtitle">ROSTER & MASTERY TRACKER</p>
        <p class="start-prompt">KLICKE ZUM STARTEN</p>
    </div>

    <nav id="navbar" class="hidden">
        <div class="nav-left"><h2>Stein-Wrestling</h2><button id="nav-roles-btn" class="nav-link active">Rollen</button><button id="nav-leaderboard-btn" class="nav-link">Leaderboard</button></div>
        <div class="nav-right"><span id="nav-username">User</span><button id="nav-settings-btn" class="icon-btn">⚙️</button><button id="nav-logout-btn" class="icon-btn">🚪</button></div>
    </nav>

    <main>
        <section id="view-login" class="view hidden"><div class="auth-container panel"><h1>ANMELDEN</h1><form id="login-form"><div class="input-group"><label>USER</label><input type="text" id="login-user" required></div><div class="input-group"><label>PASSWORT</label><input type="password" id="login-pass" required></div><button type="submit" class="btn-primary">ANMELDEN</button></form><p class="switch-auth"><a href="#" id="go-to-register">Registrieren</a></p></div></section>
        <section id="view-register" class="view hidden"><div class="auth-container panel"><h1>REG</h1><form id="register-form"><div class="input-group"><label>USER</label><input type="text" id="reg-user" required></div><div class="input-group"><label>PASSWORT</label><input type="password" id="reg-pass" required></div><button type="submit" class="btn-primary">REGISTRIEREN</button></form></div></section>
        <section id="view-roles" class="view hidden"><div class="dashboard-header"><h1>ROSTER</h1><input type="text" id="search-roles" placeholder="Suchen..."></div><div class="roles-grid" id="roles-container"></div></section>
        <section id="view-leaderboard" class="view hidden"><div class="dashboard-header"><h1>LEADERBOARD</h1></div><div class="leaderboard-container panel"><table class="leaderboard-table"><tbody id="leaderboard-rows"></tbody></table></div></section>
        <section id="view-mastery" class="view hidden"><button id="back-to-roles" class="btn-secondary">← ZURÜCK</button><div class="mastery-container"><h1 id="mastery-title"></h1><div class="mastery-box panel"><div class="progress-bar-container"><div id="mastery-bar" class="progress-bar"></div></div><input type="range" id="mastery-slider" min="0" max="10000" value="0"><button id="btn-submit-mastery" class="btn-primary">SPEICHERN</button></div></div></section>
        <section id="view-locked" class="view hidden"><button id="back-from-locked" class="btn-secondary">← ZURÜCK</button></section>
        <section id="view-settings" class="view hidden"><button id="back-from-settings" class="btn-secondary">← ZURÜCK</button></section>
    </main>

    <div id="custom-modal" class="modal-overlay hidden"><div class="modal-box panel"><h2 id="modal-title"></h2><p id="modal-message"></p><input type="password" id="modal-prompt-input" class="hidden"><button id="modal-btn-confirm" class="btn-primary">OK</button></div></div>

    <script>
        // --- CLOUD SYNC KONFIGURATION ---
        const 37dfb1198dab275e1a4b1fc3e89bd5d9 = "37dfb1198dab275e1a4b1fc3e89bd5d9"; 
        const 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 = "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";

        async function syncToCloud() {
            try {
                await fetch(`https://api.github.com/gists/${37dfb1198dab275e1a4b1fc3e89bd5d9}`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `token ${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}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ files: { 'data.json': { content: localStorage.getItem('steinUsers') } } })
                });
            } catch (e) { console.error("Sync fehlgeschlagen", e); }
        }

        async function syncFromCloud() {
            try {
                const res = await fetch(`https://api.github.com/gists/${37dfb1198dab275e1a4b1fc3e89bd5d9}`, { headers: { 'Authorization': `token ${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}` } });
                const data = await res.json();
                if(data.files && data.files['data.json']) {
                    localStorage.setItem('steinUsers', data.files['data.json'].content);
                }
            } catch (e) { console.warn("Sync laden fehlgeschlagen"); }
        }

        // --- DEIN GAME LOGIC ---
        const rolesData = [
            { id: 'ability-stealer', name: 'Ability Stealer', color: '#ff4d4d', max: 10000 },
            { id: 'clockman', name: 'ClockMan', color: '#ffb84d', max: 10000 },
            { id: 'doublelife', name: 'DoubleLife', color: '#c266ff', max: 10000 },
            { id: 'iceman', name: 'IceMan', color: '#4dd2ff', max: 10000 },
            { id: 'ninja', name: 'Ninja', color: '#33cc80', max: 10000 },
            { id: 'useless-tapper', name: 'Useless Tapper', color: '#ff88cc', max: 10000 },
            { id: 'tapper', name: 'Tapper', color: '#ff2255', max: 10000 },
            { id: 'pet', name: 'Pet', color: '#bbff33', max: 10000 },
            { id: 'secret-101', name: '_.?101', color: '#00ffcc', max: 10000 }
        ];

        let currentUser = null;

        function saveUserData() {
            let users = JSON.parse(localStorage.getItem('steinUsers'));
            users[currentUser.username].progress = currentUser.progress;
            localStorage.setItem('steinUsers', JSON.stringify(users));
            localStorage.setItem('steinUser', JSON.stringify(currentUser));
            syncToCloud(); // <-- AUTOMATISCHER SYNC BEI JEDEM SPEICHERN
        }

        async function init() {
            await syncFromCloud(); // <-- LÄDT DATEN BEIM START VOM GIST
            // Restlicher Code...
        }

        document.getElementById('view-startscreen').addEventListener('click', () => {
            document.getElementById('view-startscreen').classList.add('hidden');
            const savedUser = localStorage.getItem('steinUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                document.getElementById('navbar').classList.remove('hidden');
            }
            // Zeige Views...
        });
        
        // Füge hier deinen restlichen Code ein (oder ergänze das oben)...
        init();
    </script>
</body>
</html>
